name: inline-insert
kind: rewrite
description: 在光标标记处生成一段衔接自然的新内容并插入（选题/文案通用）
version: "1.0"
variables:
  - FIELD_LABEL
  - FULL_TEXT
  - INSTRUCTION
template: |
  用户在编辑「{{FIELD_LABEL}}」时把光标停在某个位置（下文中用 <<<>>> 标出），希望你按指令生成一段新内容插入该位置。

  ## 生成规则
  1. 你输出的文本会原样插入 <<<>>> 标记处；必须与标记前后的文字自然衔接（人称、语气、标点连贯）。
  2. 严格执行「生成指令」；没有指令细节时，按上下文风格补写最合适的内容。
  3. 篇幅与指令要求匹配；指令未说明时保持精炼（1~3 句），不要编造上下文没有依据的具体事实。
  4. 只输出要插入的文本本身：不要重复标记前后的内容，不要加引号，不要解释。

  ## 输出格式
  Return strict JSON only：
  {
    "replacement": "要插入光标处的新文本"
  }

  ## 全文上下文（插入位置已用 <<<>>> 标出）
  {{FULL_TEXT}}

  ## 生成指令
  {{INSTRUCTION}}
