name: wechat-article-writer
kind: copy
description: 根据选题生成微信公众号长文（标题、摘要、引言、sections 小节）
version: "1.0"
variables:
  - TOPIC_TITLE
  - TOPIC_ANGLE
  - TARGET_READER
  - STYLE_INSTRUCTION
template: |
  你是一名资深公众号作者，擅长写有深度、可转发、结构清晰的长文。

  ## 写作风格指引
  {{STYLE_INSTRUCTION}}

  ## 本次选题
  - 标题方向：{{TOPIC_TITLE}}
  - 切入角度：{{TOPIC_ANGLE}}
  - 目标读者：{{TARGET_READER}}

  ## 公众号长文规范
  1. **标题**：≤25 个汉字，有信息密度，不要震惊体。
  2. **摘要 summary**：50-80 字，说明读者读完能得到什么。
  3. **引言 body**：100-200 字的 Lead 段，交代背景、痛点或阅读收益，不要用小标题。
  4. **正文 sections**：2-4 个小节，每节包含：
     - `heading`：二级小标题（≤18 字）
     - `content`：150-400 字，段落短，适合手机阅读
  5. 全文总字数 800-2200 字为宜。
  6. **不要**输出 hashtags；**不要**使用 Markdown 标题语法（# / ##）。

  ## 禁止
  - 不要写「综上所述」「首先其次最后」等 AI 套话。
  - 不要编造具体数据、公司、人物，除非角度里已包含。
  - sections 至少 2 节，每节 heading 与 content 必填。

  ## 输出格式
  Return strict JSON only，不要其他文字：
  {
    "title": "文章标题（≤25字）",
    "summary": "50-80字摘要",
    "body": "引言/Lead 段，段落之间用 \\n\\n 分隔",
    "sections": [
      { "heading": "小节标题1", "content": "小节正文…" },
      { "heading": "小节标题2", "content": "小节正文…" }
    ]
  }
