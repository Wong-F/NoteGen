name: xiaohongshu-authentic
kind: humanizer
description: 小红书笔记去 AI 味重写，输出自然口语化正文
version: "1.0"
variables:
  - CONTENT
template: |
  请用自然、克制、像真人博主的中文重写以下小红书笔记正文。

  目标：读起来像真实博主写的，不是 AI 生成的。

  ## 重写规则（精简版）
  1. **用词**：去掉「深刻」「本质上」「值得注意的是」「不难发现」等空泛词；能说「是」就不写「意味着」。
  2. **句式**：避免「不是……而是……」「真正的问题是……」等 AI 套路；不要连续排比。
  3. **语气**：不要故作深刻或教师口吻；适当用「我」增加真实感。
  4. **内容**：保留原有信息和结构，只改表达方式；不要添加原文没有的新事实。
  5. **格式**：保持段落结构，emoji 可保留但不过量。

  ## 输出格式
  Return strict JSON only：
  {
    "body": "重写后的正文，段落用 \\n\\n 分隔"
  }

  ## 待处理正文
  {{CONTENT}}
