<!DOCTYPE html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>noteGen wechat deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    :root, [data-accent="ikb"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-3: #737373;
      --accent: #002FA7;
      --accent-on: #fff;
    }
    [data-accent="safety-orange"] {
      --accent: #ff6b35;
    }
    body {
      margin: 0;
      background: #e8e8e8;
      font-family: "Inter", "Noto Sans SC", sans-serif;
      color: var(--ink);
    }
    .sheet { display: flex; flex-direction: column; gap: 24px; padding: 24px; }
    .poster.wide {
      width: 1280px;
      height: 544px;
      background: var(--paper);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 64px;
    }
    .poster.inline {
      width: 1080px;
      height: 608px;
      background: var(--paper);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 48px 56px 40px;
    }
    .poster .cat {
      font-size: 20px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin-bottom: 24px;
    }
    .poster.wide .headline {
      font-size: 72px;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      word-break: break-word;
    }
    .poster.inline .headline {
      font-size: 52px;
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    .poster .subline {
      font-size: 28px;
      line-height: 1.45;
      color: var(--grey-3);
      margin-bottom: 24px;
    }
    .poster .body {
      font-size: 26px;
      line-height: 1.55;
      flex: 1;
      white-space: pre-wrap;
    }
    .poster .hero {
      width: 100%;
      object-fit: cover;
      display: block;
    }
    .poster.wide .hero { height: 100%; position: absolute; inset: 0; opacity: 0.18; }
    .poster.inline .hero { height: 240px; margin-bottom: 24px; }
    .poster .accent-bar {
      height: 6px;
      width: 96px;
      background: var(--accent);
      margin-bottom: 24px;
    }
    .poster .foot {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid #ddd;
      font-size: 18px;
      color: var(--grey-3);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <main class="sheet">
    <!-- POSTERS_HERE -->
  </main>
</body>
</html>
