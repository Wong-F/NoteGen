<!DOCTYPE html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>noteGen social deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    :root, [data-accent="ikb"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-3: #737373;
      --accent: #002FA7;
      --accent-on: #fff;
    }
    [data-accent="safety-orange"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-3: #737373;
      --accent: #ff6b35;
      --accent-on: #fff;
    }
    body {
      margin: 0;
      background: #e8e8e8;
      font-family: "Inter", "Noto Sans SC", sans-serif;
      color: var(--ink);
    }
    .sheet { display: flex; flex-direction: column; gap: 24px; padding: 24px; }
    .poster.xhs {
      width: 1080px;
      height: 1440px;
      background: var(--paper);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 72px 64px 64px;
    }
    .poster .cat {
      font-size: 22px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin-bottom: 32px;
    }
    .poster .headline {
      font-size: 88px;
      font-weight: 300;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      word-break: break-word;
    }
    .poster.cover .headline { font-size: 96px; font-weight: 200; }
    .poster .subline {
      font-size: 36px;
      line-height: 1.45;
      color: var(--grey-3);
      margin-bottom: 40px;
    }
    .poster .body {
      font-size: 32px;
      line-height: 1.55;
      flex: 1;
      white-space: pre-wrap;
    }
    .poster .hero {
      width: 100%;
      height: 520px;
      object-fit: cover;
      margin-bottom: 40px;
      display: block;
    }
    .poster .accent-bar {
      height: 8px;
      width: 120px;
      background: var(--accent);
      margin-bottom: 40px;
    }
    .poster .foot {
      margin-top: auto;
      padding-top: 32px;
      border-top: 1px solid #ddd;
      font-size: 22px;
      color: var(--grey-3);
      display: flex;
      justify-content: space-between;
    }
    .poster .badge {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-on);
      padding: 8px 16px;
      font-size: 20px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <main class="sheet">
    <!-- POSTERS_HERE -->
  </main>
</body>
</html>
